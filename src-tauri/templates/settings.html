<!DOCTYPE html>
<html style="height: 100%;">

<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="static/bulma.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.11.2/css/all.css">
    <link rel="stylesheet" href="static/style.css">
    <script src="static/overlay.js" type="text/javascript"></script>
</head>

<body style="display: flex; height: 100%;">
    <section class="top-aligned-container" id="container" style="position: fixed; z-index: 999; height: 300px; overflow-x: auto;">
        <p class="gurmukhi-1" id="gurmukhi"></p>
        <p class="" id="punjabi" style="font-family: 'anmolunibaniheavy'"></p>
        <p class="" id="english" style="font-family: 'Roboto-Regular', sans-serif"></p>
    </section>

    <section class="section column" style="overflow: auto; height: 100%; flex-basis: auto; padding-top: 300px;">
        <h3 class="title">Overlay Settings</h3>
        <form method="post" action="/save_settings">
            <div class="fixed-grid">
                <div class="grid">
                    <div class="field">
                        <label class="label">Theme</label>
                        <div class="select">
                            <select name="theme">
                                <option value="light">Light</option>
                                <option value="dark">Dark</option>
                            </select>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Gurbani Font</label>
                        <div class="select">
                            <select name="font">
                                <optgroup label="Gurbani Akhar">
                                    <option value="GurbaniAkharThick" {% if font == "GurbaniAkharThick" %}selected{% endif %}>Gurbani Akhar Thick</option>
                                    <option value="GurbaniAkhar" {% if font == "GurbaniAkhar" %}selected{% endif %}>Gurbani Akhar</option>
                                    <option value="gurbaniwebthick" {% if font == "gurbaniwebthick" %}selected{% endif %}>Gurbani Web Thick</option>
                                    <option value="OpenGurbaniAkhar-Black" {% if font == "OpenGurbaniAkhar-Black" %}selected{% endif %}>Open Gurbani Akhar Black</option>
                                    <option value="OpenGurbaniAkhar-Bold" {% if font == "OpenGurbaniAkhar-Bold" %}selected{% endif %}>Open Gurbani Akhar Bold</option>
                                    <option value="OpenGurbaniAkhar-Regular" {% if font == "OpenGurbaniAkhar-Regular" %}selected{% endif %}>Open Gurbani Akhar Regular</option>
                                </optgroup>

                                <optgroup label="Anmol Bani">
                                    <option value="anmolunibaniheavy" {% if font == "anmolunibaniheavy" %}selected{% endif %}>Anmol Uni Bani Heavy</option>
                                    <option value="OpenAnmolUni-Bold" {% if font == "OpenAnmolUni-Bold" %}selected{% endif %}>Open Anmol Uni Bold</option>
                                </optgroup>

                                <optgroup label="Raaj">
                                    <option value="raaj1" {% if font == "raaj1" %}selected{% endif %}>Raaj 1</option>
                                    <option value="raaj2" {% if font == "raaj2" %}selected{% endif %}>Raaj 2</option>
                                    <option value="raaj3" {% if font == "raaj3" %}selected{% endif %}>Raaj 3</option>
                                    <option value="raaj4" {% if font == "raaj4" %}selected{% endif %}>Raaj 4</option>
                                    <option value="raaj5" {% if font == "raaj5" %}selected{% endif %}>Raaj 5</option>
                                    <option value="raaj6" {% if font == "raaj6" %}selected{% endif %}>Raaj 6</option>
                                </optgroup>

                                <optgroup label="Others">
                                    <option value="Prabhki" {% if font == "Prabhki" %}selected{% endif %}>Prabhki</option>
                                    <option value="riyasti-naveen" {% if font == "riyasti-naveen" %}selected{% endif %}>Riyasti Naveen</option>
                                </optgroup>

                                <optgroup label="System Fonts">
                                    <option value="sans-serif" {% if font == "sans-serif" %}selected{% endif %}>Sans Serif</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Background Color</label>
                        <div class="field has-addons">
                            <p class="control">
                                <input class="input" type="text" name="background_color" id="background_color_text"
                                    value="{{ background_color }}">
                            </p>
                            <p class="control">
                                <input class="input" type="color" id="background_color_picker"
                                    value="{{ background_color }}">
                            </p>
                        </div>
                    </div>

                    <div class="cell">
                        <label class="label">Background Opacity (0.0 - 1.0)</label>
                        <div class="field has-addons">
                            <p class="control">
                                <button class="button" type="button"
                                    onclick="changeValue('background_opacity', -0.1, 0, 1)">
                                    <span class="icon is-small">
                                        <i class="fas fa-minus"></i>
                                    </span>
                                </button>
                            </p>
                            <input class="input" type="number" step="0.01" min="0" max="1" name="background_opacity"
                                id="background_opacity" value="{{ background_opacity }}">
                            <p class="control">
                                <button class="button" type="button"
                                    onclick="changeValue('background_opacity', 0.1, 0, 1)">
                                    <span class="icon is-small">
                                        <i class="fas fa-plus"></i>
                                    </span>
                                </button>
                            </p>
                        </div>
                    </div>

                    <div class="cell">
                        <label class="label">Gurmukhi Font Size</label>
                        <div class="field has-addons">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('gurmukhi_font_size', -10)">
                                    <span class="icon is-small">
                                        <i class="fas fa-minus"></i>
                                    </span>
                                </button>
                            </p>
                            <input class="input" type="number" name="gurmukhi_font_size" id="gurmukhi_font_size"
                                value="{{ gurmukhi_font_size }}">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('gurmukhi_font_size', 1)">
                                    <span class="icon is-small">
                                        <i class="fas fa-plus"></i>
                                    </span>
                                </button>
                            </p>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Gurmukhi Font Color</label>
                        <div class="field has-addons">
                            <p class="control">
                                <input class="input" type="text" name="gurmukhi_font_color"
                                    id="gurmukhi_font_color_text" value="{{ gurmukhi_font_color }}">
                            </p>
                            <p class="control">
                                <input class="input" type="color" id="gurmukhi_font_color_picker"
                                    value="{{ gurmukhi_font_color }}">
                            </p>
                        </div>
                    </div>

                    <div class="cell">
                        <label class="label">Punjabi Font Size</label>
                        <div class="field has-addons">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('punjabi_font_size', -10)">
                                    <span class="icon is-small">
                                        <i class="fas fa-minus"></i>
                                    </span>
                                </button>
                            </p>
                            <input class="input" type="number" name="punjabi_font_size" id="punjabi_font_size"
                                value="{{ punjabi_font_size }}">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('punjabi_font_size', 1)">
                                    <span class="icon is-small">
                                        <i class="fas fa-plus"></i>
                                    </span>
                                </button>
                            </p>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Punjabi Font Color</label>
                        <div class="field has-addons">
                            <p class="control">
                                <input class="input" type="text" name="punjabi_font_color" id="punjabi_font_color_text"
                                    value="{{ punjabi_font_color }}">
                            </p>
                            <p class="control">
                                <input class="input" type="color" id="punjabi_font_color_picker"
                                    value="{{ punjabi_font_color }}">
                            </p>
                        </div>
                    </div>

                    <div class="cell">
                        <label class="label">English Font Size</label>
                        <div class="field has-addons">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('english_font_size', -10)">
                                    <span class="icon is-small">
                                        <i class="fas fa-minus"></i>
                                    </span>
                                </button>
                            </p>
                            <input class="input" type="number" name="english_font_size" id="english_font_size"
                                value="{{ english_font_size }}">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('english_font_size', 1)">
                                    <span class="icon is-small">
                                        <i class="fas fa-plus"></i>
                                    </span>
                                </button>
                            </p>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">English Font Color</label>
                        <div class="field has-addons">
                            <p class="control">
                                <input class="input" type="text" name="english_font_color" id="english_font_color_text"
                                    value="{{ english_font_color }}">
                            </p>
                            <p class="control">
                                <input class="input" type="color" id="english_font_color_picker"
                                    value="{{ english_font_color }}">
                            </p>
                        </div>
                    </div>

                    <div class="cell">
                        <label class="label">Panel Gap X</label>
                        <div class="field has-addons">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('panel_gap_x', -40)">
                                    <span class="icon is-small">
                                        <i class="fas fa-minus"></i>
                                    </span>
                                </button>
                            </p>
                            <input class="input" type="number" name="panel_gap_x" id="panel_gap_x" value="{{ panel_gap_x }}">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('panel_gap_x', 1)">
                                    <span class="icon is-small">
                                        <i class="fas fa-plus"></i>
                                    </span>
                                </button>
                            </p>
                        </div>
                    </div>

                    <div class="cell">
                        <label class="label">Panel Gap Y</label>
                        <div class="field has-addons">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('panel_gap_y', -40)">
                                    <span class="icon is-small">
                                        <i class="fas fa-minus"></i>
                                    </span>
                                </button>
                            </p>
                            <input class="input" type="number" name="panel_gap_y" id="panel_gap_y" value="{{ panel_gap_y }}">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('panel_gap_y', 1)">
                                    <span class="icon is-small">
                                        <i class="fas fa-plus"></i>
                                    </span>
                                </button>
                            </p>
                        </div>
                    </div>

                    <div class="cell">
                        <label class="label">Punjabi Gap</label>
                        <div class="field has-addons">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('punjabi_gap', -1, -40)">
                                    <span class="icon is-small">
                                        <i class="fas fa-minus"></i>
                                    </span>
                                </button>
                            </p>
                            <input class="input" type="number" name="punjabi_gap" id="punjabi_gap"
                                value="{{ punjabi_gap }}">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('punjabi_gap', 1, -40)">
                                    <span class="icon is-small">
                                        <i class="fas fa-plus"></i>
                                    </span>
                                </button>
                            </p>
                        </div>
                    </div>

                    <div class="cell">
                        <label class="label">English Gap</label>
                        <div class="field has-addons">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('english_gap', -1, -40)">
                                    <span class="icon is-small">
                                        <i class="fas fa-minus"></i>
                                    </span>
                                </button>
                            </p>
                            <input class="input" type="number" name="english_gap" id="english_gap"
                                value="{{ english_gap }}">
                            <p class="control">
                                <button class="button" type="button" onclick="changeValue('english_gap', 1, -40)">
                                    <span class="icon is-small">
                                        <i class="fas fa-plus"></i>
                                    </span>
                                </button>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <button type="submit" class="button is-primary">Save Settings</button>
                </div>
            </div>
        </form>
    </section>

    <script>
        function changeValue(id, delta, min = 0, max = Infinity) {
            const input = document.getElementById(id);
            if (!input) return;

            const step = parseFloat(input.step) || 1;
            let currentValue = parseFloat(input.value) || 0;

            // Special case for opacity: we want to keep it within 1 decimal place
            if (id === 'background_opacity') {
                let newValue = Math.round((currentValue + delta) * 100) / 100;
                newValue = Math.min(Math.max(newValue, min), max);
                input.value = newValue.toFixed(2);  // Ensure one decimal place for opacity
            } else {
                // For other fields, round as needed
                let newValue = Math.round((currentValue + delta) * 10) / 10;
                newValue = Math.min(Math.max(newValue, min), max);
                input.value = newValue.toFixed(step < 1 ? 1 : 0);
            }
        }

        // Sync color text input and color picker for background and font colors
        const colorSync = (textId, pickerId) => {
            const colorText = document.getElementById(textId);
            const colorPicker = document.getElementById(pickerId);

            colorText.addEventListener('input', () => {
                if (/^rgba?\((\d{1,3}), (\d{1,3}), (\d{1,3}), ([0-1](?:\.\d{1,2})?)\)$/i.test(colorText.value)) {
                    const rgbaValues = colorText.value.match(/^rgba?\((\d{1,3}), (\d{1,3}), (\d{1,3}), ([0-1](?:\.\d{1,2})?)\)$/);
                    const hexColor = `#${(1 << 24 | (parseInt(rgbaValues[1]) << 16) | (parseInt(rgbaValues[2]) << 8) | parseInt(rgbaValues[3])).toString(16).slice(1)}`;
                    colorPicker.value = hexColor;
                }
            });

            colorPicker.addEventListener('input', () => {
                const hexColor = colorPicker.value;
                colorText.value = hexColor;
            });
        };

        colorSync('background_color_text', 'background_color_picker');
        colorSync('gurmukhi_font_color_text', 'gurmukhi_font_color_picker');
        colorSync('punjabi_font_color_text', 'punjabi_font_color_picker');
        colorSync('english_font_color_text', 'english_font_color_picker');
    </script>
</body>

</html>
