<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="static/bulma.min.css">
    <link rel="stylesheet" href="static/style.css">

    <script src="static/overlay.js" type="text/javascript"></script>

</head>

<body>
    <section class="top-aligned-container"
        id="container"
        style="
            background-color: {{ background_color }};
            opacity: {{ background_opacity }};
            padding: {{ panel_gap_x }}px {{ panel_gap_y }}px;
        "
    >
        <p class="gurmukhi-1" id="gurmukhi">{{ gurmukhi }}</p>
        <p class="" id="punjabi" style="font-family: 'anmolunibaniheavy';">{{ punjabi }}</p>
        <p class="" id="english" style="font-family: 'Roboto-Regular', sans-serif;">{{ english }}</p>
    </section>
</body>

</html>
